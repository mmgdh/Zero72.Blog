services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zero72_blog
      POSTGRES_USER: zero72
      POSTGRES_PASSWORD: zero72_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zero72 -d zero72_blog"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/Zero72.Blog.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__BlogDb: Host=postgres;Port=5432;Database=zero72_blog;Username=zero72;Password=zero72_dev_password
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:8080"

  client:
    build:
      context: .
      dockerfile: src/Zero72.Blog.Client/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      - api
    ports:
      - "8080:8080"

volumes:
  postgres-data:
